<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise API</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./assets/index.css" />
  </head>
  <body>
    <header class="position-relative">
      <div class="container d-flex justify-content-between p-0 mt-3">
        <img
          src="./assets/umbreon svg.png"
          alt="umbreon"
          class="img-fluid w-25 pokemon"
        />
        <img
          src="./assets/Eevolution prism Pink Floyd Pokémon Wallpaper.png"
          alt="logo"
          class="img-fluid w-25 pokemon"
        />
        <img
          src="./assets/espeon svg.png"
          alt="espeon"
          class="img-fluid w-25 pokemon"
        />
      </div>
    </header>
    <main>
      <section id="attackBooks" class="container-fluid mt-5">
        <div id="bookShelf" class="row"></div>
      </section>
      <!-- Modal -->
      <div
        class="modal fade"
        id="staticBackdrop"
        data-bs-backdrop="static"
        data-bs-keyboard="false"
        tabindex="-1"
        aria-labelledby="staticBackdropLabel"
        aria-hidden="true"
      >
        <div class="modal-dialog">
          <div class="modal-content pokemon">
            <div class="modal-header">
              <h1 class="modal-title fs-5" id="staticBackdropLabel">
                Your cart
              </h1>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
              ></button>
            </div>
            <div class="modal-body">
              Do you want to add this item to your cart?
            </div>
            <div class="modal-footer d-flex justify-content-between">
              <button
                type="button"
                class="btn btn-danger bi bi-cart-dash"
                data-bs-dismiss="modal"
              ></button>
              <button
                type="button"
                class="btn btn-success bi bi-cart-check"
              ></button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./script/index.js"></script>
  </body>
</html>
